  <!-- google_fonts (Flutter web) fetch fonts.gstatic.com với header khiến CORS preflight bị từ chối → app crash trước login. -->
  <script>
  (function () {
    if (typeof window.fetch !== 'function') return;
    var orig = window.fetch;
    window.fetch = function (input, init) {
      var url = typeof input === 'string' ? input : (input && input.url) || '';
      if (url.indexOf('fonts.gstatic.com') === -1) {
        return orig.apply(this, arguments);
      }
      if (input instanceof Request && init === undefined) {
        var h = new Headers(input.headers);
        h.delete('cache-control');
        h.delete('pragma');
        input = new Request(input.url, {
          method: input.method, headers: h, mode: input.mode, credentials: input.credentials,
          cache: 'default', redirect: input.redirect, referrer: input.referrer,
          referrerPolicy: input.referrerPolicy, integrity: input.integrity,
          keepalive: input.keepalive, signal: input.signal
        });
        return orig.call(this, input);
      }
      init = init ? Object.assign({}, init) : {};
      init.cache = 'default';
      if (init.headers instanceof Headers) {
        var h2 = new Headers(init.headers);
        h2.delete('cache-control');
        h2.delete('pragma');
        init.headers = h2;
      } else if (init.headers && typeof init.headers === 'object') {
        var o = Object.assign({}, init.headers);
        delete o['cache-control'];
        delete o['Cache-Control'];
        delete o['pragma'];
        delete o['Pragma'];
        init.headers = o;
      }
      return orig.call(this, input, init);
    };
  })();
  </script>

  <script>
    function clearAppCache() {
      // Xoá localStorage
      localStorage.clear();
      // Xoá sessionStorage
      sessionStorage.clear();
      // Xoá service worker cache
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (var n of names) caches.delete(n);
        });
      }
      // Unregister service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          for (var r of regs) r.unregister();
        });
      }
      // Reload bỏ cache
      setTimeout(function() { location.reload(true); }, 300);
    }
  </script>

  <!-- Force unregister old Service Workers ngay khi load -->
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      regs.forEach(function(r) { r.unregister(); });
    });
    if ('caches' in window) {
      caches.keys().then(function(names) {
        names.forEach(function(n) { caches.delete(n); });
      });
    }
  }
  </script>
  <!-- Flutter load ngầm -->
  <script src="flutter_bootstrap.js?v=1776215542" async></script>
  <script>
    // Giả lập tiến trình dựa trên thời gian thực tế (~10s)
    (function() {
      var bar = document.getElementById('progress-bar');
      var pct = document.getElementById('progress-pct');
      var progress = 0;
      var done = false;

      // Tăng nhanh đầu, chậm dần cuối (easing, ước ~20s)
      var timer = setInterval(function() {
        if (done) return;
        var remaining = 95 - progress;
        var step = Math.max(0.15, remaining * 0.03);
        progress = Math.min(95, progress + step);
        bar.style.width = progress + '%';
        pct.textContent = Math.round(progress) + '%';
      }, 200);

      function dismissOverlay() {
        done = true;
        clearInterval(timer);
        if (bar) bar.style.width = '100%';
        if (pct) pct.textContent = '100%';
        setTimeout(function() {
          var overlay = document.getElementById('loading-overlay');
          var shell = document.getElementById('app-shell');
          if (overlay) { overlay.classList.add('fade-out'); setTimeout(function() { overlay.remove(); }, 400); }
          if (shell) { shell.remove(); }
        }, 300);
      }

      window.addEventListener('flutter-first-frame', dismissOverlay);

      // Thông báo đang tải lâu ở giây 30 (mạng chậm)
      setTimeout(function() {
        if (done) return;
        var pctEl = document.getElementById('progress-pct');
        if (pctEl) pctEl.textContent = 'Đang tải...';
      }, 30000);

      // Tránh xoay vô hạn nếu Flutter lỗi (font, JS, v.v.) — timeout 60s
      setTimeout(function() {
        if (done) return;
        clearInterval(timer);
        var overlay = document.getElementById('loading-overlay');
        if (!overlay || overlay.classList.contains('fade-out')) return;
        overlay.innerHTML = '<div style="max-width:360px;text-align:center;padding:24px;color:#fff;font-family:system-ui,sans-serif">' +
          '<p style="font-size:16px;margin:0 0 12px">Không tải được ứng dụng (quá lâu hoặc lỗi script).</p>' +
          '<p style="font-size:13px;opacity:.85;margin:0 0 16px">Thử xóa cache / Ctrl+Shift+R hoặc bấm nút dưới.</p>' +
          '<button type="button" onclick="clearAppCache()" style="padding:12px 20px;border-radius:10px;border:0;background:#fff;color:#1a1a2e;font-weight:600;cursor:pointer">Xóa cache & tải lại</button></div>';
      }, 60000);
    })();
  </script>
